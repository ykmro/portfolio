services:
  - type: web
    name: cinema-english
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    preDeployCommand: "bundle exec rails db:migrate"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cinema-english-db
          property: connectionString
      - key: RAILS_MASTER_KEY
        sync: false
      - key: RAILS_ENV
        value: production
      - key: RAILS_LOG_TO_STDOUT
        value: "true"

databases:
  - name: cinema-english-db
    databaseName: cinema_english_production
    user: cinema_english